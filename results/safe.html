<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runway — You're Safe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=TeX+Gyre+Pagella&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-snap-type: y mandatory; overflow-y: scroll; height: 100%; }
    body { background: #c8dfc0; height: 100%; }

    .screen {
      min-height: 100vh;
      scroll-snap-align: start;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 2rem 2.5rem;
      position: relative; overflow: hidden; text-align: center;
    }

    .aura { position: absolute; border-radius: 50%; pointer-events: none; }

    .aura-1 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(180,222,158,0.9) 0%, rgba(130,190,110,0.3) 45%, transparent 70%);
      top: -170px; left: -140px;
    }
    .aura-2 {
      width: 340px; height: 340px;
      background: radial-gradient(circle, rgba(90,160,80,0.4) 0%, transparent 65%);
      bottom: -100px; right: -90px;
    }
    .aura-c {
      width: 560px; height: 260px;
      background: radial-gradient(ellipse, rgba(200,235,185,0.45) 0%, transparent 65%);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
    }

    .youre {
      font-family: 'TeX Gyre Pagella', Palatino, serif;
      font-size: 1.1rem; font-style: italic;
      color: #2d5a27; position: relative; z-index: 1;
    }
    .state-word {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(5rem, 20vw, 7.5rem);
      line-height: 0.9; color: #2d5a27;
      position: relative; z-index: 1; margin-bottom: 1.4rem;
    }
    .body-copy {
      font-family: 'TeX Gyre Pagella', Palatino, serif;
      font-size: 0.92rem; font-style: italic;
      color: #3a6b33; line-height: 1.65;
      max-width: 250px; position: relative; z-index: 1; margin-bottom: 1.2rem;
    }
    .number-card {
      width: 138px; height: 138px; border-radius: 22px;
      background: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1; margin-bottom: 1rem;
    }
    .number-card span {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      font-size: 5.5rem; line-height: 1; color: #2d5a27;
    }
    .months-label {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: clamp(2.5rem, 9vw, 3.5rem);
      color: #2d5a27; position: relative; z-index: 1; margin-bottom: 2rem;
    }

    /* chart card */
    .chart-card {
      width: 100%; max-width: 340px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.38);
      border-radius: 16px; padding: 1rem 1rem 0.8rem;
      position: relative; z-index: 1;
    }
    .chart-title {
      font-family: 'TeX Gyre Pagella', Palatino, serif;
      font-size: 0.75rem; font-style: italic;
      color: #3a6b33; margin-bottom: 0.6rem; letter-spacing: 0.04em;
    }
    .legend {
      display: flex; gap: 14px; justify-content: center;
      margin-bottom: 8px;
      font-family: 'TeX Gyre Pagella', Palatino, serif;
      font-size: 11px; color: #3a6b33;
    }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .leg-line { width: 12px; height: 2.5px; border-radius: 2px; display: inline-block; }

    .back-btn {
      margin-top: 1.6rem;
      font-family: 'TeX Gyre Pagella', Palatino, serif;
      font-size: 0.8rem; font-style: italic;
      color: #3a6b33; text-decoration: none;
      border-bottom: 1px solid rgba(58,107,51,0.4);
      padding-bottom: 1px;
      position: relative; z-index: 1;
      transition: color 0.2s;
    }
    .back-btn:hover { color: #2d5a27; }
  </style>
</head>
<body>
<section class="screen">
  <div class="aura aura-1"></div>
  <div class="aura aura-2"></div>
  <div class="aura aura-c"></div>

  <div class="youre">You're</div>
  <div class="state-word">Safe</div>
  <div class="body-copy">You can maintain your current standards of living for another</div>
  <div class="number-card"><span id="months-num">—</span></div>
  <div class="months-label">months</div>

  <div class="chart-card">
    <div class="chart-title">Cash balance over time</div>
    <div class="legend">
      <span><span class="leg-line" style="background:#2d7a3a;"></span>Cash balance</span>
      <span><span class="leg-line" style="background:#c0392b; border-top: 2px dashed #c0392b; height:0; margin-top:1px;"></span>Zero line</span>
    </div>
    <div style="position:relative; width:100%; height:180px;">
      <canvas id="runwayChart" role="img" aria-label="Line chart showing cash balance declining to zero">Cash balance declining to zero over the runway period.</canvas>
    </div>
  </div>

  <a href="index.html" class="back-btn">← Recalculate</a>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  // read values passed from index.html via URL
  const params = new URLSearchParams(window.location.search);
  const cash   = parseFloat(params.get('cash'))   || 120000;
  const burn   = parseFloat(params.get('burn'))   || 15000;
  const months = parseInt(params.get('months'))   || 8;

  // show the number
  document.getElementById('months-num').textContent = months;

  // build chart data month by month
  const labels = [], data = [];
  for (let i = 0; i <= months + 1; i++) {
    labels.push('Mo ' + i);
    data.push(Math.max(0, cash - burn * i));
  }

  // highlight the zero point in red
  const ptColors = data.map((v, i) => i === months ? '#c0392b' : 'transparent');
  const ptRadii  = data.map((v, i) => i === months ? 5 : 0);

  new Chart(document.getElementById('runwayChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Cash balance',
          data,
          borderColor: '#2d7a3a',
          borderWidth: 2.5,
          pointBackgroundColor: ptColors,
          pointRadius: ptRadii,
          fill: true,
          backgroundColor: 'rgba(45,122,58,0.12)',
          tension: 0.3
        },
        {
          label: 'Zero',
          data: Array(labels.length).fill(0),
          borderColor: '#c0392b',
          borderDash: [5, 4],
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => '$' + Math.round(ctx.parsed.y).toLocaleString()
          }
        }
      },
      scales: {
        x: {
          ticks: { font: { size: 10 }, color: '#3a6b33', autoSkip: true, maxRotation: 0 },
          grid: { color: 'rgba(45,90,39,0.1)' }
        },
        y: {
          min: 0,
          ticks: {
            font: { size: 10 }, color: '#3a6b33',
            callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v)
          },
          grid: { color: 'rgba(45,90,39,0.1)' }
        }
      }
    }
  });
</script>
</body>
</html>
