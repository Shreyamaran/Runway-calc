<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Runway — Danger</title>

 <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=TeX+Gyre+Pagella&display=swap" rel="stylesheet" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: 'Cormorant Garamond', serif;
  background: #8b2020;
  color: #f5caca;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  padding: 2rem;
  text-align: center;
}

/* top section */
.state-word { font-size: 5rem; color: #ff6b6b;
      font-style: italic; font-weight: 300;
 }
.youre { font-style: italic; }
.body-copy { font-style: italic; opacity: 0.9; }

.number-card {
  width: 120px;
  height: 120px;
  margin: 1rem auto;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.25);
  border-radius: 16px;
}
.number-card span { font-size: 4rem; }

.months-label { font-size: 2.5rem; }

/* chart */
.chart-card {
  width: 100%;
  max-width: 420px;
  background: rgba(0,0,0,0.25);
  border-radius: 16px;
  padding: 1rem;
  backdrop-filter: blur(6px);
}

.chart-title {
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  margin-bottom: 0.5rem;
  opacity: 0.8;
}

.legend {
  display: flex;
  justify-content: center;
  gap: 1rem;
  font-size: 0.7rem;
  margin-bottom: 0.5rem;
}

.leg-line {
  display: inline-block;
  width: 14px;
  height: 2px;
  margin-right: 4px;
}

/* back button */
.back-btn {
  text-decoration: none;
  font-size: 0.8rem;
  opacity: 0.7;
  color: #f5caca;
}
</style>
</head>

<body>

<div class="youre">You're in</div>
<div class="state-word">Danger</div>
<div class="body-copy">You can maintain your current standards of living for another</div>

<div class="number-card"><span id="months-num">0</span></div>
<div class="months-label">months</div>

<!-- CHART -->
<div class="chart-card">
  <div class="chart-title">Cash balance over time</div>

  <div class="legend">
    <span><span class="leg-line" style="background:#ff6b6b;"></span>Cash balance</span>
    <span><span class="leg-line" style="border-top:2px dashed #ff9a9a; height:0;"></span>Zero line</span>
  </div>

  <div style="position:relative; width:100%; height:180px;">
    <canvas id="runwayChart"></canvas>
  </div>
</div>

<a href="index.html" class="back-btn">← Recalculate</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
// params
const params = new URLSearchParams(window.location.search);
const cash   = parseFloat(params.get('cash'))   || 120000;
const burn   = parseFloat(params.get('burn'))   || 15000;
const months = parseInt(params.get('months'))   || 8;

// display number
document.getElementById('months-num').textContent = months;

// data
const labels = [], data = [];
for (let i = 0; i <= months + 1; i++) {
  labels.push('Mo ' + i);
  data.push(Math.max(0, cash - burn * i));
}

// highlight zero point
const ptColors = data.map((v, i) => i === months ? '#ff6b6b' : 'transparent');
const ptRadii  = data.map((v, i) => i === months ? 5 : 0);

// chart
new Chart(document.getElementById('runwayChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        data,
        borderColor: '#ff6b6b',
        borderWidth: 2,
        pointBackgroundColor: ptColors,
        pointRadius: ptRadii,
        fill: true,
        backgroundColor: 'rgba(255,107,107,0.15)',
        tension: 0.3
      },
      {
        data: Array(labels.length).fill(0),
        borderColor: '#ff9a9a',
        borderDash: [5, 4],
        borderWidth: 1,
        pointRadius: 0
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false }
    },
    scales: {
      x: {
        ticks: { color: '#f5caca', font: { size: 10 } },
        grid: { color: 'rgba(255,255,255,0.08)' }
      },
      y: {
        min: 0,
        ticks: {
          color: '#f5caca',
          font: { size: 10 },
          callback: v => '$' + (v >= 1000 ? (v/1000)+'k' : v)
        },
        grid: { color: 'rgba(255,255,255,0.08)' }
      }
    }
  }
});
</script>

</body>
</html>
