<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runway — Result States</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=TeX+Gyre+Pagella&display=swap" rel="stylesheet" />
  <link href="resultstyle.css" rel="stylesheet" />
   
</head>
<body>

  <!-- ── SAFE ── -->
  <section class="screen screen-safe">
    <div class="aura aura-a"></div>
    <div class="aura aura-b"></div>
    <div class="aura aura-c"></div>

    <div class="youre">You're</div>
    <div class="state-word">Safe</div>
    <div class="body-copy">You can maintain your current standards of living for another</div>
    <div class="number-card"><span>8</span></div>
    <div class="months-label">months</div>

    <div class="scroll-hint">
      <span>scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- ── FINE ── -->
  <section class="screen screen-fine">
    <div class="aura aura-a"></div>
    <div class="aura aura-b"></div>
    <div class="aura aura-c"></div>

    <div class="youre">You're</div>
    <div class="state-word">Fine</div>
    <div class="body-copy">You can maintain your current standards of living for another</div>
    <div class="number-card"><span>8</span></div>
    <div class="months-label">months</div>

    <div class="scroll-hint">
      <span>scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- ── DANGER ── -->
  <section class="screen screen-danger">
    <div class="aura aura-a"></div>
    <div class="aura aura-b"></div>
    <div class="aura aura-c"></div>

    <div class="youre">You're in</div>
    <div class="state-word">Danger</div>
    <div class="body-copy">You can maintain your current standards of living for another</div>
    <div class="number-card"><span>8</span></div>
    <div class="months-label">months</div>
  </section>

</body>
</html>
